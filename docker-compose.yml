services:
  postgres:
    image: postgres:16-alpine
    container_name: kicker-board-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kicker
      POSTGRES_PASSWORD: kicker
      POSTGRES_DB: kicker_board
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kicker -d kicker_board"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
